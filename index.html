<!DOCTYPE html>
<html lang="fr">
<head>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonCanal</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --sunset-1: #0f0c29;
      --sunset-2: #302b63;
      --sunset-3: #24243e;
      --orange: #ff6b35;
      --pink: #f7931e;
      --gold: #ffd700;
      --glass: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.15);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #ff6b35 80%, #f7931e 100%);
      background-attachment: fixed;
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 0 100px;
    }

    .header {
      padding: 32px 20px 20px;
      text-align: center;
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(90deg, #ffd700, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .points-card {
      margin: 0 16px 24px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
    }

    .points-label {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .points-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffd700, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .points-icon {
      font-size: 40px;
      filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.5));
    }

    .section { display: none; padding: 0 16px; }
    .section.active { display: block; }

    .pub-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      backdrop-filter: blur(20px);
    }

    .pub-icon {
      font-size: 64px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.6));
    }

    .pub-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .pub-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .pub-reward {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 500;
      color: var(--gold);
      margin-bottom: 24px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
    }

    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* CATEGORIES */
    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .cat-btn {
      padding: 8px 16px;
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      background: var(--glass);
      color: var(--text-dim);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .cat-btn.active {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      border-color: transparent;
      color: #fff;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .catalogue-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .content-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .content-card:active { transform: scale(0.97); }

    .content-preview {
      position: relative;
      height: 140px;
      background: linear-gradient(135deg, #302b63, #ff6b35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .content-preview img,
    .content-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(12px) brightness(0.7);
      transform: scale(1.1);
    }

    .content-preview.unlocked img,
    .content-preview.unlocked video {
      filter: none;
      transform: scale(1);
    }

    .lock-icon {
      position: absolute;
      font-size: 28px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    .content-preview.unlocked .lock-icon { display: none; }

    .owned-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,200,100,0.9);
      border-radius: 50px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      display: none;
    }

    .content-preview.unlocked .owned-badge { display: block; }

    .content-type-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 50px;
      padding: 3px 8px;
      font-size: 11px;
    }

    .content-info { padding: 10px 12px; }

    .content-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .content-price {
      font-size: 12px;
      color: var(--gold);
      font-weight: 600;
    }

    .btn-buy {
      padding: 5px 12px;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-buy.owned {
      background: rgba(0,200,100,0.2);
      color: #00c864;
    }

    .purchases-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .purchase-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }

    .purchase-icon { font-size: 32px; }
    .purchase-info { flex: 1; }

    .purchase-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .purchase-date {
      font-size: 12px;
      color: var(--text-dim);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-dim);
    }

    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; display: block; }

    .toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,20,20,0.95);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 12, 41, 0.95);
      border-top: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      display: flex;
      z-index: 100;
    }

    .bottom-nav-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .bottom-nav-btn span { display: block; font-size: 22px; margin-bottom: 3px; }
    .bottom-nav-btn.active { color: var(--orange); }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-logo">✨ MonCanal</div>
    </div>

    <div class="points-card">
      <div>
        <div class="points-label">Mes points</div>
        <div class="points-value" id="pointsValue">...</div>
      </div>
      <div class="points-icon">💰</div>
    </div>

    <!-- SECTION PUB -->
    <div class="section active" id="section-pub">
      <div class="pub-card">
        <div class="pub-icon">📺</div>
        <div class="pub-title">Gagne des points</div>
        <div class="pub-desc">Regarde une courte publicité et reçois des points à dépenser dans la boutique.</div>
        <div class="pub-reward">⭐ +10 points par pub</div>
        <button class="btn-primary" id="watchAdBtn" onclick="watchAd()">▶ Regarder une pub</button>
      </div>
    </div>

    <!-- SECTION BOUTIQUE -->
    <div class="section" id="section-boutique">
      <div class="section-title">🛍️ Boutique</div>
      <div class="category-tabs">
        <button class="cat-btn active" onclick="filterCatalogue('all', this)">🌟 Tout</button>
        <button class="cat-btn" onclick="filterCatalogue('photo', this)">📸 Photos</button>
        <button class="cat-btn" onclick="filterCatalogue('video', this)">🎥 Vidéos</button>
        <button class="cat-btn" onclick="filterCatalogue('premium', this)">⭐ Premium</button>
      </div>
      <div class="catalogue-grid" id="catalogueGrid">
        <div class="loading">Chargement...</div>
      </div>
    </div>

    <!-- SECTION MES ACHATS -->
    <div class="section" id="section-achats">
      <div class="section-title">📁 Mes achats</div>
      <div class="purchases-list" id="purchasesList">
        <div class="loading">Chargement...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showSection('pub', this)">
      <span>📺</span>Pub
    </button>
    <button class="bottom-nav-btn" onclick="showSection('boutique', this)">
      <span>🛍️</span>Boutique
    </button>
    <button class="bottom-nav-btn" onclick="showSection('achats', this)">
      <span>📁</span>Mes achats
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const API_URL = 'https://family-production-32cc.up.railway.app';
    let userId = tg.initDataUnsafe?.user?.id;
    let userPoints = 0;
    let purchases = [];
    let allItems = [];
    let currentFilter = 'all';

    // ── INIT ──
    async function init() {
      if (!userId) userId = 'test123';
      await loadUser();
      await loadPurchases();
    }

    async function loadUser() {
      try {
        const res = await fetch(`${API_URL}/user/${userId}`);
        const data = await res.json();
        userPoints = data.points || 0;
        document.getElementById('pointsValue').textContent = userPoints;
      } catch (e) {
        document.getElementById('pointsValue').textContent = '0';
      }
    }

    async function loadPurchases() {
      try {
        const res = await fetch(`${API_URL}/purchases/${userId}`);
        purchases = await res.json();
      } catch (e) {
        purchases = [];
      }
    }

    // ── NAVIGATION ──
    function showSection(name, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`section-${name}`).classList.add('active');
      btn.classList.add('active');
      if (name === 'boutique') loadCatalogue();
      if (name === 'achats') renderPurchases();
    }

    // ── PUB ──
    function watchAd() {
      if (window.Adsgram) {
        const AdController = window.Adsgram.init({ blockId: '28820' });
        AdController.show().then(async () => {
          await creditPoints();
        }).catch(() => {
          showToast('❌ Pub non disponible, réessaie plus tard.');
        });
      } else {
        creditPoints();
      }
    }

    async function creditPoints() {
      try {
        const res = await fetch(`${API_URL}/reward`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: String(userId) })
        });
        const data = await res.json();

        if (data.error) {
          showToast(`⏳ ${data.error}`);
          return;
        }

        userPoints = data.points;
        document.getElementById('pointsValue').textContent = userPoints;
        showToast('🎉 +10 points gagnés !');

        document.getElementById('watchAdBtn').disabled = true;
        document.getElementById('watchAdBtn').textContent = '⏳ Patiente 30s...';
        setTimeout(() => {
          document.getElementById('watchAdBtn').disabled = false;
          document.getElementById('watchAdBtn').textContent = '▶ Regarder une pub';
        }, 30000);
      } catch (e) {
        showToast('❌ Erreur, réessaie.');
      }
    }

    // ── CATALOGUE ──
    function filterCatalogue(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCatalogue();
    }

    function renderCatalogue() {
      const grid = document.getElementById('catalogueGrid');
      const purchaseIds = purchases.map(p => p.contentId);

      const filtered = currentFilter === 'all'
        ? allItems
        : allItems.filter(item => item.category === currentFilter);

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><span class="emoji">🛍️</span>Aucun contenu dans cette catégorie.</div>';
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const owned = purchaseIds.includes(item.id);
        const typeIcon = item.category === 'video' ? '🎥' : item.category === 'premium' ? '⭐' : '📸';
        return `
          <div class="content-card" onclick="buyContent('${item.id}', ${item.price}, '${item.title}', ${owned})">
            <div class="content-preview ${owned ? 'unlocked' : ''}">
              <div style="font-size:48px;">${typeIcon}</div>
              <div class="lock-icon">${owned ? '' : '🔒'}</div>
              <div class="owned-badge">✅ Acheté</div>
              <div class="content-type-badge">${typeIcon}</div>
            </div>
            <div class="content-info">
              <div class="content-title">${item.title}</div>
              <div class="content-footer">
                <div class="content-price">${owned ? '✅' : `💰 ${item.price} pts`}</div>
                <button class="btn-buy ${owned ? 'owned' : ''}">${owned ? 'Acheté' : 'Acheter'}</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadCatalogue() {
      const grid = document.getElementById('catalogueGrid');
      grid.innerHTML = '<div class="loading">Chargement...</div>';
      try {
        const res = await fetch(`${API_URL}/catalogue`);
        allItems = await res.json();
        renderCatalogue();
      } catch (e) {
        grid.innerHTML = '<div class="empty-state"><span class="emoji">❌</span>Erreur de chargement.</div>';
      }
    }

    // ── ACHAT ──
    async function buyContent(contentId, price, title, owned) {
      if (owned) {
        showToast('✅ Tu possèdes déjà ce contenu !');
        return;
      }

      if (userPoints < price) {
        showToast(`❌ Points insuffisants ! Il te faut ${price} pts.`);
        return;
      }

      tg.showConfirm(`Acheter "${title}" pour ${price} points ?`, async (confirmed) => {
        if (!confirmed) return;
        try {
          const res = await fetch(`${API_URL}/buy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: String(userId), contentId })
          });
          const data = await res.json();

          if (data.error) {
            showToast(`❌ ${data.error}`);
            return;
          }

          userPoints = data.points;
          document.getElementById('pointsValue').textContent = userPoints;
          showToast('🎉 Contenu envoyé en message privé !');
          await loadPurchases();
          renderCatalogue();
        } catch (e) {
          showToast('❌ Erreur lors de l\'achat.');
        }
      });
    }

    // ── MES ACHATS ──
    function renderPurchases() {
      const list = document.getElementById('purchasesList');
      if (purchases.length === 0) {
        list.innerHTML = '<div class="empty-state"><span class="emoji">📭</span>Aucun achat pour le moment.<br>Gagne des points et explore la boutique !</div>';
        return;
      }
      list.innerHTML = purchases.map(p => `
        <div class="purchase-item">
          <div class="purchase-icon">📸</div>
          <div class="purchase-info">
            <div class="purchase-title">${p.title}</div>
            <div class="purchase-date">✅ Débloqué</div>
          </div>
        </div>
      `).join('');
    }

    // ── TOAST ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    init();
  </script>git add .
